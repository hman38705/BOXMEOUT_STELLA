name: GitPadi CI Agent

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run (remind-contributors, review-and-merge, score-applicant, grade-assignment, create-issues)'
        required: true
        default: 'remind-contributors'
      pr_number:
        description: 'PR number (for review-and-merge / grade-assignment)'
        required: false
      issues_file:
        description: 'Issues file path (for create-issues)'
        required: false
        default: 'issues.json'

jobs:
  run-action:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Remind Contributors ──────────────────────────────────────────
      - name: Remind Contributors (12-hour warning)
        if: ${{ github.event.inputs.action == 'remind-contributors' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100,
            });

            const assignedIssues = issues.filter(
              (issue) => !issue.pull_request && issue.assignees.length > 0
            );

            console.log(`Found ${assignedIssues.length} assigned open issue(s).`);

            for (const issue of assignedIssues) {
              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                {
                  owner, repo,
                  issue_number: issue.number,
                  per_page: 100,
                  mediaType: { previews: ['mockingbird'] },
                }
              );

              const hasLinkedPR = timeline.some(
                (event) =>
                  event.event === 'cross-referenced' &&
                  event.source?.issue?.pull_request
              );

              if (hasLinkedPR) {
                console.log(`Issue #${issue.number} already has a linked PR — skipping.`);
                continue;
              }

              const mentions = issue.assignees.map((a) => `@${a.login}`).join(', ');

              const body = [
                `⚠️ **Unassignment Warning** — ${mentions}`,
                ``,
                `No pull request has been linked to this issue yet.`,
                ``,
                `Please submit a PR within the next **12 hours** or you will be **unassigned** from this issue so someone else can pick it up.`,
                ``,
                `If you need more time, drop a comment here with a quick progress update and we'll take it into account.`,
              ].join('\n');

              await github.rest.issues.createComment({
                owner, repo,
                issue_number: issue.number,
                body,
              });

              console.log(`Posted warning on issue #${issue.number} for ${mentions}.`);
            }
